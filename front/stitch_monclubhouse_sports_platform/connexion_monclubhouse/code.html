<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-gradient {
            background: linear-gradient(135deg, #2b2d42 0%, #1b4332 100%);
        }
    </style>

<body class="bg-login-gradient min-h-screen flex items-center justify-center p-4">
<!-- Login Container -->
<main class="w-full max-w-[420px] bg-white rounded-xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-500" style="padding: 40px;">
<!-- Header / Logo Section -->
<header class="flex flex-col items-center mb-stack_xl">
<div class="w-14 h-14 bg-[#2d6a4f] rounded-lg flex items-center justify-center mb-stack_md">
<span class="text-white font-black text-headline-md tracking-tighter">MCH</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-background text-center">MonClubHouse</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-1">Ton club, ta maison</p>
</header>
<!-- Login Form -->
<form class="space-y-stack_lg" id="loginForm">
<!-- Email Field -->
<div class="space-y-stack_sm">
<label class="block font-label-lg text-label-lg text-on-surface" for="email">Adresse e-mail</label>
<div class="relative group">
<input class="w-full px-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md outline-none" id="email" name="email" placeholder="nom@votreclub.fr" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack_sm">
<div class="flex justify-between items-center">
<label class="block font-label-lg text-label-lg text-on-surface" for="password">Mot de passe</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Oublié ?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-3 px-4 bg-[#2d6a4f] hover:bg-[#1b4332] text-white font-label-lg text-label-lg rounded-lg transition-all transform active:scale-[0.98] shadow-sm" type="submit">
                Se connecter
            </button>
</form>
<!-- Divider -->
<div class="relative my-stack_xl">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-md">
<span class="px-3 bg-white text-on-surface-variant">ou</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-white border border-outline-variant hover:bg-surface-container-low text-on-surface font-label-lg text-label-lg rounded-lg transition-all">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Continuer avec Google
        </button>
<!-- Footer -->
<footer class="mt-stack_xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Pas de compte ? 
                <a class="text-primary font-label-lg hover:underline decoration-2 underline-offset-4 ml-1" href="#">S'inscrire</a>
</p>
</footer>
</main>
<!-- Micro-interactions Script -->
<script>
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const passwordIcon = document.getElementById('passwordIcon');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        // Form submission animation mock
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            `;
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('Simulation: Connexion réussie vers le tableau de bord.');
            }, 1500);
        });
    </script>
</body></html>
