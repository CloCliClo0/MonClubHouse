<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MCH - Créer un compte</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed": "#92f7c3",
                      "on-secondary": "#ffffff",
                      "surface-container-highest": "#e0e0fc",
                      "outline-variant": "#bfc9c1",
                      "on-primary-container": "#a8e7c5",
                      "on-tertiary": "#ffffff",
                      "surface-dim": "#d7d8f4",
                      "primary-container": "#2d6a4f",
                      "primary": "#0f5238",
                      "on-surface-variant": "#404943",
                      "on-primary": "#ffffff",
                      "on-tertiary-container": "#89edba",
                      "tertiary": "#005236",
                      "on-primary-fixed": "#002114",
                      "surface-container": "#edecff",
                      "surface-container-low": "#f4f2ff",
                      "surface-container-lowest": "#ffffff",
                      "inverse-on-surface": "#f1efff",
                      "primary-fixed": "#b1f0ce",
                      "inverse-surface": "#2d2f44",
                      "surface": "#fbf8ff",
                      "tertiary-fixed-dim": "#75daa8",
                      "on-surface": "#181a2e",
                      "on-error-container": "#93000a",
                      "surface-variant": "#e0e0fc",
                      "secondary-fixed-dim": "#a5d0b9",
                      "on-tertiary-fixed": "#002113",
                      "on-background": "#181a2e",
                      "on-primary-fixed-variant": "#0e5138",
                      "surface-bright": "#fbf8ff",
                      "on-error": "#ffffff",
                      "secondary": "#3f6653",
                      "inverse-primary": "#95d4b3",
                      "background": "#fbf8ff",
                      "secondary-fixed": "#c1ecd4",
                      "surface-container-high": "#e6e6ff",
                      "secondary-container": "#beead1",
                      "error-container": "#ffdad6",
                      "outline": "#707973",
                      "error": "#ba1a1a",
                      "surface-tint": "#2c694e",
                      "on-tertiary-fixed-variant": "#005235",
                      "tertiary-container": "#006d48",
                      "on-secondary-fixed": "#002114",
                      "on-secondary-fixed-variant": "#274e3d",
                      "primary-fixed-dim": "#95d4b3",
                      "on-secondary-container": "#436b58"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack_sm": "8px",
                      "stack_xl": "32px",
                      "gutter": "24px",
                      "topbar_height": "64px",
                      "stack_md": "16px",
                      "stack_lg": "24px",
                      "sidebar_width": "260px",
                      "container_max_width": "1280px"
              },
              "fontFamily": {
                      "headline-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "body-md": ["Inter"],
                      "headline-lg": ["Inter"],
                      "label-md": ["Inter"],
                      "label-lg": ["Inter"],
                      "body-sm": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "display-lg": ["Inter"]
              },
              "fontSize": {
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                      "label-lg": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                      "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                      "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                      "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "800"}]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-focus:focus {
            border-color: #2d6a4f !important;
            box-shadow: 0 0 0 2px rgba(45, 106, 79, 0.2);
            outline: none;
        }
        .bg-custom-gradient {
            background: linear-gradient(135deg, #2b2d42 0%, #1b4332 100%);
        }
    </style>
</head>
<body class="bg-custom-gradient min-h-screen flex items-center justify-center p-gutter font-body-md text-on-surface">
<!-- Registration Card -->
<main class="w-full max-w-[440px] bg-white rounded-xl p-[40px] shadow-2xl flex flex-col items-center">
<!-- Header Section -->
<div class="mb-stack_xl text-center flex flex-col items-center">
<div class="w-[56px] h-[56px] bg-primary-container rounded-lg flex items-center justify-center mb-stack_md">
<span class="text-white font-headline-lg text-headline-lg font-black tracking-tight">MCH</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack_sm">Créer un compte</h1>
<p class="font-body-md text-on-surface-variant">Rejoins ton club</p>
</div>
<!-- Registration Form -->
<form action="#" class="w-full flex flex-col gap-stack_lg" method="POST" onsubmit="event.preventDefault();">
<!-- Two Column Name Row -->
<div class="grid grid-cols-2 gap-stack_md">
<div class="flex flex-col gap-stack_sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="first_name">Prénom</label>
<input class="w-full px-stack_md py-2.5 rounded-lg border border-outline-variant bg-white text-on-surface font-body-md form-input-focus" id="first_name" name="first_name" placeholder="Jean" required="" type="text"/>
</div>
<div class="flex flex-col gap-stack_sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="last_name">Nom</label>
<input class="w-full px-stack_md py-2.5 rounded-lg border border-outline-variant bg-white text-on-surface font-body-md form-input-focus" id="last_name" name="last_name" placeholder="Dupont" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-stack_sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email</label>
<input class="w-full px-stack_md py-2.5 rounded-lg border border-outline-variant bg-white text-on-surface font-body-md form-input-focus" id="email" name="email" placeholder="jean.dupont@email.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-stack_sm relative">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Mot de passe</label>
<div class="relative">
<input class="w-full px-stack_md py-2.5 rounded-lg border border-outline-variant bg-white text-on-surface font-body-md form-input-focus pr-10" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant/70 italic">8 car. min., 1 majuscule, 1 chiffre</p>
</div>
<!-- Role Dropdown -->
<div class="flex flex-col gap-stack_sm">
<label class="font-label-md text-label-md text-on-surface-variant" for="role">Rôle</label>
<div class="relative">
<select class="w-full appearance-none px-stack_md py-2.5 rounded-lg border border-outline-variant bg-white text-on-surface font-body-md form-input-focus pr-10" id="role" name="role" required="">
<option disabled="" selected="" value="">Choisir un rôle</option>
<option value="joueur">Joueur</option>
<option value="parent">Parent</option>
<option value="visiteur">Visiteur</option>
</select>
<div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-stack_md bg-primary-container text-white py-3 px-stack_lg rounded-lg font-label-lg text-label-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                Créer mon compte
            </button>
</form>
<!-- Footer -->
<footer class="mt-stack_xl text-center">
<p class="font-body-md text-on-surface-variant">
                Déjà un compte ? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Se connecter</a>
</p>
</footer>
</main>
<!-- Optional micro-interaction script -->
<script>
        // Password visibility toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        const icon = toggleBtn?.querySelector('.material-symbols-outlined');

        if(toggleBtn && passwordInput && icon) {
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                icon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        }

        // Add subtle hover/focus effects to inputs
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#0f5238';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '';
            });
        });
    </script>
</body></html>
