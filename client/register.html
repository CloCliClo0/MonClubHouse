<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — MonClubHouse</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand-logo">MCH</div>
      <h1>Créer un compte</h1>
      <p>Rejoins ton club</p>
    </div>

    <div id="form-error" class="form-error hidden" style="background:#fee2e2;padding:10px 14px;border-radius:8px;margin-bottom:16px;"></div>

    <form id="register-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="prenom">Prénom</label>
          <input type="text" id="prenom" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="nom">Nom</label>
          <input type="text" id="nom" class="form-control" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-control" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input type="password" id="password" class="form-control" required autocomplete="new-password">
        <p class="form-hint">8 caractères minimum, 1 majuscule, 1 chiffre</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="role">Rôle</label>
        <select id="role" class="form-control">
          <option value="joueur">Joueur</option>
          <option value="parent">Parent</option>
          <option value="visiteur">Visiteur</option>
        </select>
      </div>
      <button type="submit" id="btn-submit" class="btn btn-primary w-full btn-lg">Créer mon compte</button>
    </form>

    <div class="divider">ou</div>

    <a href="/api/auth/google" class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuer avec Google
    </a>

    <div class="auth-switch">
      Déjà un compte ? <a href="/login.html">Se connecter</a>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const errEl = document.getElementById('form-error');
    errEl.classList.add('hidden');
    btn.disabled = true; btn.textContent = 'Création...';

    const res = await MCH.api('POST', '/auth/register', {
      prenom: document.getElementById('prenom').value,
      nom: document.getElementById('nom').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      role: document.getElementById('role').value
    });

    if (res?.ok) {
      MCH.setTokens(res.data.data.access_token, res.data.data.refresh_token);
      window.location.href = '/dashboard.html';
    } else {
      const msg = res?.data?.errors?.[0]?.msg || res?.data?.message || 'Erreur lors de l\'inscription';
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Créer mon compte';
    }
  });
</script>
</body>
</html>
